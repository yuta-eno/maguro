```html
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホでも綺麗に表示し、ズームを防ぐ設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>限界突破！超絶連打マグロつり</title>
  
  <!-- React と ReactDOM の読み込み -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- ブラウザ上でJSXを変換するためのBabel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- デザインを整えるTailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black overscroll-none touch-none">
  <!-- ゲームが表示される場所 -->
  <div id="root"></div>

  <!-- ここからゲームのプログラム -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const FISH_DATA = [
      { id: 1, name: '【神話】ダイオウイカ', emoji: '🦑✨', hp: 777, time: 15.0, points: 99999, rarity: 'EX', desc: '深海の悪夢！画面が割れるまで叩きまくれ！！', color: 'text-purple-500 font-black text-shadow-glow' },
      { id: 2, name: '【伝説】大間のクロマグロ', emoji: '🐟✨', hp: 500, time: 12.0, points: 50000, rarity: 'UR', desc: '伝説のヌシ！大人2人でも指がツルぞ！！', color: 'text-yellow-500 font-black text-shadow-glow' },
      { id: 3, name: '【狂暴】ホオジロザメ', emoji: '🦈', hp: 400, time: 10.0, points: 15000, rarity: 'SSR', desc: '休むな！休んだら食われるぞ！！', color: 'text-red-600 font-black' },
      { id: 4, name: 'キハダマグロ', emoji: '🐠', hp: 300, time: 12.0, points: 3000, rarity: 'SR', desc: 'ここからが本当の地獄だ！2人で叩け！', color: 'text-yellow-300' },
      { id: 5, name: 'ビンナガマグロ', emoji: '🐡', hp: 200, time: 10.0, points: 1000, rarity: 'R', desc: '大人1人がガチになってギリギリ！', color: 'text-gray-200' },
      { id: 6, name: 'カツオ', emoji: '🐟', hp: 150, time: 10.0, points: 500, rarity: 'N', desc: '普通の魚でもこの硬さ！', color: 'text-blue-200' },
      { id: 7, name: 'マダイ', emoji: '🐠', hp: 120, time: 10.0, points: 300, rarity: 'N', desc: 'おめでたいけど硬すぎる！', color: 'text-red-400' },
      { id: 8, name: '重すぎる長靴', emoji: '👢', hp: 100, time: 10.0, points: 10, rarity: 'Trash', desc: 'ただの長靴なのに重すぎる…（最低100連打）', color: 'text-orange-900' },
    ];

    function App() {
      const [phase, setPhase] = useState('title');
      const [score, setScore] = useState(0);
      const [targetFish, setTargetFish] = useState(null);
      const [fishHp, setFishHp] = useState(0);
      const [maxHp, setMaxHp] = useState(0);
      const [timeLeft, setTimeLeft] = useState(0);
      const [maxTime, setMaxTime] = useState(0);
      const [resultMsg, setResultMsg] = useState('');
      const [caughtHistory, setCaughtHistory] = useState([]);
      const [showBook, setShowBook] = useState(false);
      const [combo, setCombo] = useState(0); 
      
      const styles = `
        @keyframes float {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-15px); }
        }
        @keyframes shake-violent {
          0% { transform: translate(0, 0) rotate(0deg); }
          20% { transform: translate(-15px, 15px) rotate(-15deg); }
          40% { transform: translate(20px, -20px) rotate(20deg); }
          60% { transform: translate(-25px, -15px) rotate(-10deg); }
          80% { transform: translate(15px, 25px) rotate(15deg); }
          100% { transform: translate(0, 0) rotate(0deg); }
        }
        @keyframes pulse-fast {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.05); }
        }
        @keyframes danger-flash {
          0%, 100% { background-color: rgba(255, 0, 0, 0.2); }
          50% { background-color: rgba(255, 0, 0, 0.6); }
        }
        .animate-float { animation: float 2s ease-in-out infinite; }
        .animate-shake-violent { animation: shake-violent 0.1s linear infinite; }
        .animate-pulse-fast { animation: pulse-fast 0.2s ease-in-out infinite; }
        .bg-danger { animation: danger-flash 0.3s infinite; }
        .no-select { user-select: none; -webkit-user-select: none; touch-action: none; }
        .text-shadow-glow { text-shadow: 0 0 10px rgba(255, 215, 0, 1), 0 0 20px rgba(255, 0, 0, 0.8); }
        .text-shadow-black { text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000; }
      `;

      const castLine = () => {
        setPhase('waiting');
        setCombo(0);
      };

      useEffect(() => {
        let timeout;
        if (phase === 'waiting') {
          const waitTime = Math.random() * 2000 + 1000;
          timeout = setTimeout(() => {
            setPhase('bite');
          }, waitTime);
        }
        return () => clearTimeout(timeout);
      }, [phase]);

      useEffect(() => {
        let timeout;
        if (phase === 'bite') {
          timeout = setTimeout(() => {
            setPhase('result');
            setTargetFish(null);
            setResultMsg('にげられた…（反応がおそい！）');
          }, 1000);
        }
        return () => clearTimeout(timeout);
      }, [phase]);

      const hookFish = () => {
        if (phase !== 'bite') return;
        
        const rand = Math.random() * 100;
        let selected;
        if (rand < 2) selected = FISH_DATA[0]; 
        else if (rand < 5) selected = FISH_DATA[1]; 
        else if (rand < 15) selected = FISH_DATA[2]; 
        else if (rand < 30) selected = FISH_DATA[3]; 
        else if (rand < 50) selected = FISH_DATA[4]; 
        else if (rand < 70) selected = FISH_DATA[5]; 
        else if (rand < 90) selected = FISH_DATA[6]; 
        else selected = FISH_DATA[7]; 

        setTargetFish(selected);
        setMaxHp(selected.hp);
        setFishHp(selected.hp);
        setMaxTime(selected.time);
        setTimeLeft(selected.time);
        setPhase('battle');
      };

      useEffect(() => {
        let timer;
        if (phase === 'battle') {
          timer = setInterval(() => {
            setTimeLeft((prev) => {
              if (prev <= 0.1) {
                setPhase('result');
                setResultMsg('時間切れ…筋肉が足りない！！');
                return 0;
              }
              return prev - 0.1;
            });
          }, 100);
        }
        return () => clearInterval(timer);
      }, [phase]);

      const handleTap = (e) => {
        // デフォルトのスクロールなどを防ぐ
        if (e.cancelable) e.preventDefault();
        if (phase !== 'battle') return;

        let tapCount = 1;
        if (e.changedTouches) {
          tapCount = e.changedTouches.length;
        }

        setCombo(c => c + tapCount);

        setFishHp((prev) => {
          const next = prev - tapCount;
          if (next <= 0) {
            setPhase('result');
            setScore((s) => s + targetFish.points);
            setResultMsg('つりあげた！！！指の限界突破！');
            
            setCaughtHistory(prevHistory => {
              const exists = prevHistory.find(f => f.id === targetFish.id);
              if (exists) {
                return prevHistory.map(f => f.id === targetFish.id ? { ...f, count: f.count + 1 } : f);
              } else {
                return [...prevHistory, { ...targetFish, count: 1 }];
              }
            });
          }
          return next;
        });
      };

      const resetGame = () => {
        setTargetFish(null);
        setPhase('idle');
      };

      const isMonster = targetFish && targetFish.hp >= 300;

      return (
        <div className={`min-h-screen flex flex-col font-sans no-select relative overflow-hidden ${isMonster && phase === 'battle' ? 'bg-danger' : 'bg-sky-100'}`}
             onTouchStart={phase === 'battle' ? handleTap : undefined}
             onMouseDown={phase === 'battle' ? handleTap : undefined}>
          <style>{styles}</style>

          <header className="bg-white/95 p-3 shadow-md flex justify-between items-center z-10 relative border-b-4 border-blue-400">
            <div className="text-xl font-black text-blue-900">
              SCORE: <span className="text-3xl text-red-600">{score}</span>
            </div>
            <button 
              onClick={(e) => { e.stopPropagation(); setShowBook(!showBook); }}
              className="bg-blue-600 text-white px-4 py-2 rounded-full font-bold shadow-lg hover:bg-blue-700 transition"
            >
              {showBook ? '海にもどる' : '図鑑'}
            </button>
          </header>

          {showBook && (
            <div className="absolute inset-0 top-[68px] bg-sky-50 z-20 p-4 overflow-y-auto pb-20">
              <h2 className="text-3xl font-black text-center text-blue-800 mb-6 border-b-4 border-blue-300 pb-2">つったさかな図鑑</h2>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                {FISH_DATA.map(fish => {
                  const caught = caughtHistory.find(f => f.id === fish.id);
                  return (
                    <div key={fish.id} className={`p-3 rounded-xl shadow-md border-4 text-center transition-all flex flex-col justify-between ${caught ? 'bg-white border-blue-400' : 'bg-gray-200 border-gray-300 opacity-50'}`}>
                      <div>
                        <div className="text-5xl mb-2">{caught ? fish.emoji : '❓'}</div>
                        <div className={`font-black text-sm md:text-base leading-tight ${caught ? fish.color : 'text-gray-500'}`}>{caught ? fish.name : '？？？'}</div>
                      </div>
                      <div className="text-xs text-gray-500 mt-2 font-bold bg-gray-100 rounded py-1">{caught ? `捕獲数: ${caught.count}匹` : '未発見'}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {!showBook && (
            <main className={`flex-1 flex flex-col relative z-0 ${isMonster && phase === 'battle' ? 'bg-red-900' : 'bg-gradient-to-b from-sky-400 via-blue-600 to-blue-900'}`}>
              
              <div className="flex-1 flex flex-col items-center justify-center p-4 z-10 w-full h-full">

                {phase === 'title' && (
                  <div className="bg-white/95 p-6 md:p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border-8 border-blue-700">
                    <h1 className="text-4xl md:text-5xl font-black text-blue-900 mb-2 drop-shadow-md leading-tight">
                      <span className="text-red-600 text-5xl md:text-6xl text-shadow-black">限界突破！</span><br/>超絶連打つり
                    </h1>
                    <p className="text-gray-800 mb-6 font-black text-base md:text-lg bg-yellow-100 p-4 rounded-xl border-4 border-yellow-500">
                      最低でも<span className="text-red-600 text-2xl">100連打</span>必要！<br/>
                      大物は<span className="text-red-600 text-2xl">500連打以上！</span><br/>
                      スマホを机に置いて、<br/>親子で全指を使って乱れ打ちしろ！
                    </p>
                    <button 
                      onClick={() => setPhase('idle')}
                      className="w-full bg-red-600 hover:bg-red-700 text-white text-3xl font-black py-5 px-8 rounded-full shadow-[0_8px_0_#7f1d1d] active:shadow-none active:translate-y-[8px] transition-all"
                    >
                      指の覚悟完了
                    </button>
                  </div>
                )}

                {phase === 'idle' && (
                  <div className="text-center">
                    <div className="text-8xl mb-8 animate-float">🎣</div>
                    <button 
                      onClick={castLine}
                      className="bg-green-500 hover:bg-green-600 text-white text-4xl font-black py-6 px-12 rounded-full shadow-[0_10px_0_#14532d] active:shadow-none active:translate-y-[10px] transition-all"
                    >
                      いとをたらす
                    </button>
                  </div>
                )}

                {phase === 'waiting' && (
                  <div className="text-center">
                    <div className="text-6xl mb-8 animate-float">🔴</div>
                    <h2 className="text-4xl font-black text-white drop-shadow-lg animate-pulse">
                      じっとまとう……
                    </h2>
                  </div>
                )}

                {phase === 'bite' && (
                  <div className="text-center cursor-pointer w-full h-full flex flex-col items-center justify-center absolute inset-0 z-50 bg-black/50 backdrop-blur-sm" onMouseDown={hookFish} onTouchStart={hookFish}>
                    <div className="text-[150px] mb-2 animate-shake-violent text-red-500 font-black drop-shadow-[0_0_30px_rgba(255,255,255,1)]">
                      ！！
                    </div>
                    <h2 className="text-7xl md:text-8xl font-black text-yellow-400 text-shadow-glow animate-pulse-fast mb-10">
                      HIT!!!
                    </h2>
                    <div className="bg-red-600 text-white text-4xl md:text-5xl font-black py-6 px-12 rounded-full shadow-[0_10px_0_#7f1d1d] pointer-events-none">
                      急いでタップ！！
                    </div>
                  </div>
                )}

                {phase === 'battle' && targetFish && (
                  <div className="text-center w-full max-w-xl flex flex-col h-full justify-center">
                    
                    {isMonster && (
                      <div className="text-white text-2xl md:text-3xl font-black mb-2 animate-pulse bg-red-600 py-3 rounded-xl border-4 border-yellow-400 text-shadow-black">
                        🚨 緊急事態 🚨<br/>
                        <span className="text-xl md:text-2xl text-yellow-300">休むな！指が折れるまで叩け！！</span>
                      </div>
                    )}

                    <div className={`p-4 md:p-6 rounded-3xl shadow-2xl mb-4 border-8 ${isMonster ? 'bg-black border-red-600' : 'bg-white/95 border-blue-600'}`}>
                      <div className="flex justify-between items-end mb-2">
                        <span className={`text-xl md:text-2xl font-black ${isMonster ? 'text-red-400' : 'text-blue-900'}`}>
                          {targetFish.emoji} のこり
                        </span>
                        <span className={`text-4xl md:text-5xl font-black ${timeLeft < 3 ? 'text-red-500 animate-pulse text-shadow-black' : (isMonster ? 'text-white' : 'text-gray-800')}`}>
                          ⏱️ {timeLeft.toFixed(1)}秒
                        </span>
                      </div>
                      
                      <div className={`text-center my-4 font-black ${isMonster ? 'text-red-500 text-shadow-glow' : 'text-blue-600'}`}>
                        <span className="text-7xl md:text-9xl">{fishHp}</span>
                        <span className="text-3xl"> 回</span>
                      </div>

                      <div className={`w-full h-6 rounded-full overflow-hidden border-4 relative ${isMonster ? 'bg-gray-800 border-red-900' : 'bg-gray-200 border-gray-400'}`}>
                        <div 
                          className={`h-full transition-all duration-75 ease-out ${isMonster ? 'bg-gradient-to-r from-red-700 to-red-500' : 'bg-gradient-to-r from-blue-500 to-sky-400'}`}
                          style={{ width: `${(fishHp / maxHp) * 100}%` }}
                        />
                      </div>
                    </div>

                    <div className="flex justify-center items-center gap-8 mb-4 h-24 pointer-events-none">
                      <div className={`text-[100px] leading-none ${isMonster ? 'animate-shake-violent' : 'animate-shake'}`}>
                        {targetFish.emoji}
                      </div>
                      {combo > 0 && (
                        <div className="text-5xl md:text-6xl font-black text-yellow-400 italic text-shadow-glow animate-pulse-fast">
                          {combo} HIT!!
                        </div>
                      )}
                    </div>

                    <div className="flex-1 flex items-end justify-center w-full relative mt-4">
                      <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none opacity-40">
                        <span className="text-5xl md:text-7xl font-black text-white text-center leading-tight text-shadow-black animate-pulse-fast">
                          画面のどこでも<br/>全力で叩け！！！
                        </span>
                      </div>
                    </div>
                  </div>
                )}

                {phase === 'result' && (
                  <div className="bg-white/95 p-6 md:p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border-8 border-yellow-500 animate-[float_1s_ease-out] z-50">
                    <h2 className="text-3xl md:text-4xl font-black text-blue-900 mb-6 border-b-4 border-blue-200 pb-2 leading-tight">{resultMsg}</h2>
                    
                    {targetFish && fishHp <= 0 ? (
                      <div className="mb-8">
                        <div className="text-[120px] mb-2 animate-bounce drop-shadow-2xl leading-none">{targetFish.emoji}</div>
                        <div className={`text-3xl md:text-4xl mb-4 ${targetFish.color}`}>
                          {targetFish.name}
                        </div>
                        <div className="text-gray-800 font-black mb-6 bg-gray-200 p-4 rounded-xl text-lg border-2 border-gray-400">
                          {targetFish.desc}
                        </div>
                        <div className="text-4xl md:text-5xl font-black text-red-600 bg-yellow-100 py-4 rounded-full border-4 border-yellow-400 animate-pulse-fast text-shadow-glow">
                          +{targetFish.points} pt!!
                        </div>
                      </div>
                    ) : (
                      <div className="text-[100px] mb-8 animate-shake leading-none">💨 🦴</div>
                    )}

                    <button 
                      onClick={resetGame}
                      className="w-full bg-blue-600 hover:bg-blue-700 text-white text-3xl font-black py-5 px-8 rounded-full shadow-[0_8px_0_#1e3a8a] active:shadow-none active:translate-y-[8px] transition-all"
                    >
                      次の戦いへ
                    </button>
                  </div>
                )}

              </div>
            </main>
          )}
        </div>
      );
    }

    // Reactを画面に描画する
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>

```
